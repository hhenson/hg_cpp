name: Python wheels

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheel:
    name: Build ${{ matrix.os }} wheel
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-15-intel
          - macos-14

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install wheel build tools
        run: python -m pip install --upgrade build abi3audit
      - name: Build stable ABI wheel
        run: python -m build --wheel
      - name: Verify wheel ABI
        shell: python
        run: |
          from pathlib import Path
          import subprocess

          wheels = list(Path("dist").glob("*.whl"))
          assert len(wheels) == 1, wheels
          wheel = wheels[0]
          assert "-cp312-abi3-" in wheel.name, wheel.name
          subprocess.check_call(["abi3audit", "--strict", str(wheel)])
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  test-wheel:
    name: Test ${{ matrix.os }} / Python ${{ matrix.python-version }}
    needs: build-wheel
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-15-intel
          - macos-14
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/download-artifact@v5
        with:
          name: wheel-${{ matrix.os }}
          path: dist
      - name: Install wheel and test dependencies
        shell: python
        run: |
          from pathlib import Path
          import subprocess
          import sys

          wheels = list(Path("dist").glob("*.whl"))
          assert len(wheels) == 1, wheels
          subprocess.check_call([
              sys.executable, "-m", "pip", "install", "--upgrade",
              str(wheels[0]), "pytest>=8", "frozendict>=2.4",
          ])
      - name: Confirm stable extension is loaded
        run: python -c "import _hgraph; print(_hgraph.__file__)"
      - name: Run Python compatibility suite
        run: python -m pytest python/tests -q -m "not wip"
